<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796" role="img" aria-labelledby="title desc">
  <title>Signal Bloom Phone</title>
  <desc>Abstract Kestrel Roost wallpaper with layered gradients, orbit lines, and a simple kestrel silhouette.</desc>
  <defs>
