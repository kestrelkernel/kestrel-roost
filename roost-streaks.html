<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Track creative streaks in Kestrel's Roost" />
  <title>Roost Streaks | Kestrel's Roost</title>
  <style>
    :root { --bg:#0b1020; --bg2:#101b3d; --fg:#e6ecff; --muted:#9fb0ff; --line:#2b3a7a; --card:#0d1530cc; --accent:#7aa2ff; --good:#8fffcd; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; color:var(--fg); background:radial-gradient(circle at 15% -5%, #22397d 0%, transparent 40%),radial-gradient(circle at 85% 105%, #1a2758 0%, transparent 45%),linear-gradient(180deg, var(--bg2), var(--bg)); min-height:100vh; }
    .wrap { width:min(960px,92vw); margin:34px auto; display:grid; gap:14px; }
    .card { border:1px solid var(--line); background:var(--card); border-radius:16px; padding:18px; }
    h1,h2,h3 { margin:0; }
    p { color:var(--muted); }
    .nav { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    a,button,input { font:inherit; }
    .chip,button { text-decoration:none; color:#dbe4ff; border:1px solid #4660be; border-radius:999px; background:#112057; padding:7px 12px; cursor:pointer; }
    button:hover,.chip:hover { background:#132668; border-color:#6f8dff; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .task-input { background:#0a1438; border:1px solid #3f56a8; border-radius:10px; color:#e6ecff; padding:9px 12px; min-width:220px; }
    .grid { display:grid; gap:10px; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); margin-top:12px; }
    .task { border:1px solid #2f438d; border-radius:12px; background:#0a1333; padding:12px; display:grid; gap:8px; }
    .streak { color:var(--good); font-size:1.15rem; }
    .mini { color:#9cb0f5; font-size:.82rem; }
    .heatmap { display:grid; grid-template-columns:repeat(28,1fr); gap:4px; margin-top:12px; }
    .day { height:11px; border-radius:3px; background:#121f50; }
    .lv1 { background:#234ca8; } .lv2{ background:#2f73e6; } .lv3 { background:#56a0ff; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>roost streaks</h1>
      <p>Simple streak cockpit for daily creative momentum. Local-only, zero accounts.</p>
      <nav class="nav" aria-label="page links">
        <a class="chip" href="index.html">home</a>
        <a class="chip" href="shipyard.html">shipyard</a>
        <a class="chip" href="roost-routines.html">routines</a>
      </nav>
    </section>

    <section class="card">
      <div class="controls">
        <input id="newTask" class="task-input" placeholder="Add streak track (e.g. ship feature)" maxlength="42" />
        <button id="addTask">add track</button>
        <button id="resetAll">reset all</button>
      </div>
      <div id="tasks" class="grid"></div>
    </section>

    <section class="card">
      <h2>last 4 weeks activity</h2>
      <p class="mini">Each check-in raises the day intensity.</p>
      <div id="heatmap" class="heatmap" aria-label="activity heatmap"></div>
    </section>
  </main>

  <script>
    const KEY = 'roost-streaks-v1';
    const HEAT_KEY = 'roost-streaks-heat-v1';
    const today = () => new Date().toISOString().slice(0,10);
    const daysBetween = (a,b) => Math.floor((new Date(b) - new Date(a)) / 86400000);

    const state = JSON.parse(localStorage.getItem(KEY) || '{"tasks":[{"name":"ship user-facing feature","streak":0,"best":0,"last":null},{"name":"write launch-ready content","streak":0,"best":0,"last":null}]}');
    const heat = JSON.parse(localStorage.getItem(HEAT_KEY) || '{}');

    function save(){
      localStorage.setItem(KEY, JSON.stringify(state));
      localStorage.setItem(HEAT_KEY, JSON.stringify(heat));
    }

    function markHeat(){
      const d = today();
      heat[d] = Math.min((heat[d] || 0) + 1, 3);
    }

    function checkIn(task){
      const t = today();
      if(task.last === t) return;
      const gap = task.last ? daysBetween(task.last, t) : null;
      task.streak = gap === 1 ? task.streak + 1 : 1;
      task.best = Math.max(task.best, task.streak);
      task.last = t;
      markHeat();
      save();
      render();
    }

    function removeTask(index){
      state.tasks.splice(index, 1);
      save();
      render();
    }

    function addTask(){
      const input = document.getElementById('newTask');
      const name = input.value.trim();
      if(!name) return;
      state.tasks.push({ name, streak:0, best:0, last:null });
      input.value = '';
      save();
      render();
    }

    function renderHeatmap(){
      const el = document.getElementById('heatmap');
      el.innerHTML = '';
      for(let i=27;i>=0;i--){
        const d = new Date();
        d.setDate(d.getDate()-i);
        const key = d.toISOString().slice(0,10);
        const lv = heat[key] || 0;
        const div = document.createElement('div');
        div.className = `day ${lv ? 'lv'+lv : ''}`;
        div.title = `${key} · ${lv} check-ins`;
        el.appendChild(div);
      }
    }

    function render(){
      const root = document.getElementById('tasks');
      root.innerHTML = '';
      state.tasks.forEach((task, index) => {
        const node = document.createElement('article');
        node.className = 'task';
        node.innerHTML = `
          <h3>${task.name}</h3>
          <div class="streak">${task.streak} day streak</div>
          <div class="mini">best: ${task.best} · last check-in: ${task.last || 'never'}</div>
          <div class="controls">
            <button data-action="check">check in</button>
            <button data-action="remove">remove</button>
          </div>
        `;
        node.querySelector('[data-action="check"]').onclick = () => checkIn(task);
        node.querySelector('[data-action="remove"]').onclick = () => removeTask(index);
        root.appendChild(node);
      });
      renderHeatmap();
    }

    document.getElementById('addTask').onclick = addTask;
    document.getElementById('newTask').addEventListener('keydown', e => { if(e.key === 'Enter') addTask(); });
    document.getElementById('resetAll').onclick = () => {
      if(!confirm('Reset all tracks and heatmap?')) return;
      state.tasks = [];
      Object.keys(heat).forEach(k => delete heat[k]);
      save();
      render();
    };

    render();
  </script>
</body>
</html>
