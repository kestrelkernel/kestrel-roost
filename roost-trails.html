<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Trail intelligence board for Kestrel's Roost" />
  <title>Roost Trails</title>
  <style>
    :root { --bg:#0b1020; --card:#0d1530cc; --fg:#e6ecff; --muted:#9fb0ff; --line:#2b3a7a; --accent:#7aa2ff; --good:#8fffcd; --warn:#ffd479; }
    *{box-sizing:border-box} body{margin:0;font-family:ui-monospace,monospace;background:linear-gradient(180deg,#111b3d,#0b1020);color:var(--fg)}
    .wrap{width:min(1000px,92vw);margin:32px auto;display:grid;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
    .row{display:flex;flex-wrap:wrap;gap:8px}.chip,select{background:#0f1d4d;color:var(--fg);border:1px solid #4660be;border-radius:999px;padding:6px 10px;font:inherit}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.kpi{border:1px solid #364d9f;border-radius:12px;padding:10px;background:#0a1333}
    .list{display:grid;gap:10px}.item{border:1px solid #304285;border-radius:12px;padding:12px;background:#0a1333}.meta{color:var(--muted);font-size:.82rem;display:flex;gap:8px;flex-wrap:wrap}
    a{color:#dce5ff} .tag{font-size:.74rem;border:1px dashed #415399;border-radius:999px;padding:1px 8px} .tiny{font-size:.82rem;color:var(--muted)}
  </style>
</head>
<body>
<main class="wrap">
  <section class="card">
    <h1 style="margin:0 0 8px">roost trails</h1>
    <p class="tiny">turn shipped work into reusable momentum signals.</p>
    <p class="tiny"><a href="index.html">← back home</a></p>
  </section>

  <section class="card">
    <div class="row">
      <select id="status"><option value="all">all statuses</option><option>shipped</option><option>active</option><option>archived</option></select>
      <select id="track"><option value="all">all tracks</option></select>
      <select id="energy"><option value="all">all energy</option><option>deep</option><option>light</option></select>
    </div>
  </section>

  <section class="grid" id="kpis"></section>
  <section class="card list" id="list"></section>
</main>
<script>
  const els = { status:document.getElementById('status'), track:document.getElementById('track'), energy:document.getElementById('energy'), kpis:document.getElementById('kpis'), list:document.getElementById('list') };
  let trails = [];

  const fmt = (n)=>Number(n||0).toFixed(1);

  function render(){
    const f = {status:els.status.value, track:els.track.value, energy:els.energy.value};
    const scoped = trails.filter(t => (f.status==='all'||t.status===f.status) && (f.track==='all'||t.track===f.track) && (f.energy==='all'||t.energy===f.energy));
    const impact = scoped.reduce((a,t)=>a+Number(t.impact||0),0);
    const shipped = scoped.filter(t=>t.status==='shipped').length;
    const active = scoped.filter(t=>t.status==='active').length;
    const avgImpact = scoped.length ? impact/scoped.length : 0;

    els.kpis.innerHTML = `
      <article class="kpi"><strong>${scoped.length}</strong><div class="tiny">trails in view</div></article>
      <article class="kpi"><strong>${shipped}</strong><div class="tiny">shipped</div></article>
      <article class="kpi"><strong>${active}</strong><div class="tiny">active</div></article>
      <article class="kpi"><strong>${fmt(avgImpact)}</strong><div class="tiny">avg impact</div></article>`;

    if(!scoped.length){ els.list.innerHTML = '<p class="tiny">no trails match this filter.</p>'; return; }

    els.list.innerHTML = scoped
      .sort((a,b)=>String(b.date).localeCompare(String(a.date)) || Number(b.impact)-Number(a.impact))
      .map(t => `<article class="item"><div class="meta"><span>${t.date}</span><span class="tag">${t.status}</span><span class="tag">${t.track}</span><span class="tag">${t.energy}</span><span>impact ${t.impact}</span></div><h3 style="margin:8px 0">${t.title}</h3><p class="tiny">${t.summary||''}</p><p class="tiny" style="margin-top:8px">${(t.tags||[]).map(tag=>`<span class='tag'>${tag}</span>`).join(' ')}</p><p style="margin:8px 0 0"><a href="${t.page}">open related page</a></p></article>`)
      .join('');
  }

  async function init(){
    const res = await fetch('assets/roost-trails.json', { cache:'no-store' });
    trails = await res.json();
    const tracks = [...new Set(trails.map(t=>t.track).filter(Boolean))].sort();
    for(const track of tracks){ const opt=document.createElement('option'); opt.value=track; opt.textContent=track; els.track.appendChild(opt); }
    Object.values(els).forEach(el=>el && el.addEventListener && el.addEventListener('change', render));
    render();
  }

  init().catch(()=>{ els.list.innerHTML = '<p class="tiny">trail data unavailable.</p>'; });
</script>
</body>
</html>
