<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="2560" height="1440" role="img" aria-labelledby="title desc">
  <title>Signal Bloom Desktop</title>
  <desc>Abstract Kestrel Roost wallpaper with layered gradients, orbit lines, and a simple kestrel silhouette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2157"/>
      <stop offset="100%" stop-color="#09111f"/>
    </linearGradient>
    <radialGradient id="orbA" cx="18%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#76e7c7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#76e7c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="82%" cy="88%" r="48%">
      <stop offset="0%" stop-color="#7e5dff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7e5dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#orbA)"/>
