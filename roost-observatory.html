<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Kestrel Roost observatory for tracking build momentum across updates, notes, and milestones." />
  <title>Roost Observatory</title>
  <style>
    :root {
      --bg:#0b1020;
      --bg2:#101b3d;
      --fg:#e6ecff;
      --muted:#9fb0ff;
      --accent:#7aa2ff;
      --card:#0d1530cc;
      --line:#2b3a7a;
      --good:#8fffcd;
      --warn:#ffd479;
      --chip:#101d4d;
    }
    * { box-sizing:border-box; }
    html, body { min-height:100%; }
    body {
      margin:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color:var(--fg);
      background:
        radial-gradient(circle at 12% -8%, #22397d 0%, transparent 40%),
        radial-gradient(circle at 85% 105%, #1a2758 0%, transparent 45%),
        linear-gradient(180deg, var(--bg2), var(--bg));
    }
    .wrap {
      width:min(1080px, 92vw);
      margin:34px auto;
      display:grid;
      gap:14px;
    }
    .card {
      border:1px solid var(--line);
      background:var(--card);
      border-radius:16px;
      padding:20px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 30px #00000033;
    }
    h1 { margin:0 0 8px; font-size:clamp(2rem, 5vw, 3rem); }
    h2 { margin:0 0 10px; font-size:1.02rem; color:#c3d0ff; }
    h3 { margin:0; font-size:.95rem; color:#e6ecff; }
    p { margin:0; color:var(--muted); line-height:1.55; }
    .site-nav,
    .links,
    .filter-row,
    .chips {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .site-nav { margin-top:10px; }
    .nav-link,
    .btn,
    .chip,
    .select,
    .input {
      border:1px solid #4660be;
      border-radius:10px;
      background:#112057;
      color:#dbe4ff;
      font:inherit;
      text-decoration:none;
      padding:8px 12px;
    }
    .nav-link,
    .chip {
      border-radius:999px;
      padding:5px 11px;
      font-size:.8rem;
      background:#0f1d4d;
    }
    .chip { border-style:dashed; cursor:default; }
    .btn,
    .nav-link,
    .select {
      cursor:pointer;
    }
    .btn:hover,
    .nav-link:hover,
    .btn:focus-visible,
    .nav-link:focus-visible,
    .select:focus-visible,
    .input:focus-visible {
      outline:none;
      border-color:#6f8dff;
      transform:translateY(-1px);
    }
    .input {
      flex:1 1 260px;
      background:#0a1438;
      min-width:220px;
    }
    .select { background:#0a1438; }
    .stats {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
      gap:10px;
    }
    .insight-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:10px;
    }
    .stat {
      border:1px solid #304285;
      border-radius:12px;
      background:#0a1333;
      padding:12px;
      display:grid;
      gap:6px;
    }
    .stat strong { font-size:1.3rem; }
    .tiny { font-size:.8rem; color:#9ab0ff; }
    .delta-up { color:var(--good); }
    .delta-down { color:var(--warn); }
    .delta-flat { color:#dbe4ff; }
    .insight-note {
      border:1px solid #365099;
      border-radius:12px;
      background:linear-gradient(180deg, #0d1740, #0a1333);
      padding:14px;
      display:grid;
      gap:8px;
    }
    .insight-note strong { font-size:1.12rem; }
    .rank-list {
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:8px;
    }
    .rank-item {
      border:1px solid #304285;
      border-radius:12px;
      background:#0a1333;
      padding:12px;
      display:grid;
      gap:6px;
    }
    .rank-head {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:baseline;
    }
    .rank-head a { color:#e6ecff; text-decoration:none; font-weight:700; }
    .bar-shell {
      width:100%;
      height:8px;
      border-radius:999px;
      background:#121f4b;
      overflow:hidden;
    }
    .bar-fill {
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg, #8fffcd, #7aa2ff);
    }
    .grid {
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:12px;
    }
    .stream,
    .list {
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:8px;
    }
    .item {
      border:1px solid #304285;
      border-radius:12px;
      background:#0a1333;
      padding:12px;
      display:grid;
      gap:7px;
    }
    .item a {
      color:#e6ecff;
      text-decoration:none;
      font-weight:700;
    }
    .item a:hover,
    .item a:focus-visible { color:#bfd0ff; outline:none; }
    .empty {
      border:1px dashed #415399;
      border-radius:12px;
      padding:14px;
      color:#9fb0ff;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>roost observatory</h1>
      <p>live signal board for what is shipping, where energy is going, and what tags are heating up.</p>
      <nav class="site-nav" aria-label="site sections">
        <a class="nav-link" href="index.html">home</a>
        <a class="nav-link" href="command-center.html">command center</a>
        <a class="nav-link" href="roost-compass.html">roost compass</a>
        <a class="nav-link" href="captains-log.html">captain's log</a>
        <a class="nav-link" href="shipyard.html">shipyard</a>
      </nav>
    </section>

    <section class="card">
      <h2>window + filters</h2>
      <div class="filter-row">
        <select id="window" class="select" aria-label="time window">
          <option value="14">last 14 days</option>
          <option value="30" selected>last 30 days</option>
          <option value="60">last 60 days</option>
          <option value="120">last 120 days</option>
          <option value="all">all time</option>
        </select>
        <select id="kind" class="select" aria-label="source filter">
          <option value="all">all sources</option>
          <option value="update">ships</option>
          <option value="note">notes</option>
          <option value="milestone">milestones</option>
          <option value="expedition">expeditions</option>
        </select>
        <input id="search" class="input" type="search" placeholder="search title, summary, tags" autocomplete="off" />
        <button id="clear" class="btn" type="button">clear</button>
      </div>
      <p class="tiny" id="summary">loading signals…</p>
    </section>

    <section class="card">
      <h2>momentum snapshot</h2>
      <div id="stats" class="stats" aria-live="polite"></div>
    </section>

    <section class="card">
      <h2>trend radar</h2>
      <div id="trendRadar" class="insight-grid" aria-live="polite"></div>
    </section>

    <section class="grid">
      <section class="card">
        <h2>observed activity</h2>
        <ul id="stream" class="stream" aria-live="polite"></ul>
      </section>
      <section class="card">
        <h2>tag heat</h2>
        <ul id="tags" class="list" aria-live="polite"></ul>
        <h2 style="margin-top:14px;">hot pages</h2>
        <ul id="hotPages" class="list" aria-live="polite"></ul>
      </section>
    </section>
  </main>

  <script>
    const statsEl = document.getElementById('stats');
    const trendRadarEl = document.getElementById('trendRadar');
    const streamEl = document.getElementById('stream');
    const tagsEl = document.getElementById('tags');
    const hotPagesEl = document.getElementById('hotPages');
    const summaryEl = document.getElementById('summary');
    const windowSelect = document.getElementById('window');
    const kindSelect = document.getElementById('kind');
    const searchInput = document.getElementById('search');
    const clearBtn = document.getElementById('clear');

    const loadJson = async (path, fallback) => {
      try {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error(path);
        return await response.json();
      } catch {
        return fallback;
      }
    };

    const fmtDate = (value) => {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    };

    const normalize = ({ updates, notes, milestones, expeditions }) => {
      const updateEvents = (updates?.updates || []).map((entry) => ({
        kind: 'update',
        date: entry.date,
        title: entry.title,
        summary: entry.details || entry.impact || '',
        href: entry.page || 'flight-deck.html',
        pageLabel: entry.pageLabel || entry.page || 'open page',
        tags: [entry.type, 'ship'].filter(Boolean)
      }));

      const noteEvents = (notes?.notes || []).map((entry) => ({
        kind: 'note',
        date: entry.date,
        title: entry.title,
        summary: entry.summary || '',
        href: entry.relatedPage || 'notes.html',
        tags: [...(entry.tags || []), 'note']
      }));

      const milestoneEvents = (milestones || []).map((entry) => ({
        kind: 'milestone',
        date: entry.date,
        title: entry.title,
        summary: entry.summary || entry.impact || '',
        href: 'timeline.html',
        pageLabel: 'open timeline',
        tags: [...(entry.tags || []), entry.type || 'milestone']
      }));

      const expeditionEvents = (expeditions || []).map((entry) => ({
        kind: 'expedition',
        date: entry.lastUpdated || entry.updatedAt || entry.startedAt || entry.date,
        title: entry.title,
        summary: entry.outcome || entry.summary || entry.goal || '',
        href: 'expeditions.html',
        pageLabel: 'open expeditions',
        tags: [...(entry.tags || []), entry.status || 'expedition']
      }));

      return [...updateEvents, ...noteEvents, ...milestoneEvents, ...expeditionEvents]
        .filter((entry) => entry.title && entry.date)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    };

    const getWindowStart = (windowValue) => {
      if (windowValue === 'all') return null;
      const days = Number(windowValue);
      if (!Number.isFinite(days)) return null;
      const start = new Date();
      start.setUTCDate(start.getUTCDate() - days);
      return start;
    };

    const getWindowDays = (windowValue) => {
      if (windowValue === 'all') return null;
      const days = Number(windowValue);
      return Number.isFinite(days) ? days : null;
    };

    const getWindowRange = (days) => {
      if (!days) return null;
      const end = new Date();
      const start = new Date(end);
      start.setUTCDate(start.getUTCDate() - days);
      return { start, end };
    };

    const countBy = (items, keyFn) => items.reduce((acc, item) => {
      const key = keyFn(item);
      if (!key) return acc;
      acc[key] = (acc[key] || 0) + 1;
      return acc;
    }, {});

    const filterEvents = (events) => {
      const windowValue = windowSelect.value;
      const source = kindSelect.value;
      const query = searchInput.value.trim().toLowerCase();
      const start = getWindowStart(windowValue);

      return events.filter((entry) => {
        if (source !== 'all' && entry.kind !== source) return false;
        if (start && new Date(entry.date) < start) return false;
        if (!query) return true;
        const hay = `${entry.title} ${entry.summary} ${(entry.tags || []).join(' ')}`.toLowerCase();
        return hay.includes(query);
      });
    };

    const renderStats = (events) => {
      const byKind = events.reduce((acc, entry) => {
        acc[entry.kind] = (acc[entry.kind] || 0) + 1;
        return acc;
      }, {});

      const shipRatio = events.length ? Math.round(((byKind.update || 0) / events.length) * 100) : 0;
      const latest = events[0]?.date;

      const cards = [
        { label: 'total signals', value: events.length, hint: 'all visible entries' },
        { label: 'ships', value: byKind.update || 0, hint: `${shipRatio}% of visible flow` },
        { label: 'notes', value: byKind.note || 0, hint: 'thinking + learnings' },
        { label: 'milestones', value: byKind.milestone || 0, hint: 'bigger beats landed' },
        { label: 'expeditions', value: byKind.expedition || 0, hint: 'roadmap momentum' },
        { label: 'latest signal', value: latest ? fmtDate(latest) : 'n/a', hint: 'most recent event date' }
      ];

      statsEl.innerHTML = cards.map((card) => `
        <article class="stat">
          <span class="tiny">${card.label}</span>
          <strong>${card.value}</strong>
          <span class="tiny">${card.hint}</span>
        </article>
      `).join('');
    };

    const renderTrendRadar = (allEvents) => {
      const days = getWindowDays(windowSelect.value);
      const currentRange = getWindowRange(days);
      const previousRange = days && currentRange
        ? { start: new Date(currentRange.start.getTime() - days * 24 * 60 * 60 * 1000), end: currentRange.start }
        : null;

      const currentEvents = currentRange ? allEvents.filter((entry) => new Date(entry.date) >= currentRange.start && new Date(entry.date) < currentRange.end) : allEvents;
      const previousEvents = previousRange ? allEvents.filter((entry) => new Date(entry.date) >= previousRange.start && new Date(entry.date) < previousRange.end) : [];

      const currentByKind = countBy(currentEvents, (entry) => entry.kind);
      const previousByKind = countBy(previousEvents, (entry) => entry.kind);
      const topKind = Object.entries(currentByKind).sort((a, b) => b[1] - a[1])[0];
      const topPage = Object.entries(countBy(currentEvents, (entry) => entry.href)).sort((a, b) => b[1] - a[1])[0];
      const momentumDelta = days ? currentEvents.length - previousEvents.length : 0;
      const momentumClass = momentumDelta > 0 ? 'delta-up' : momentumDelta < 0 ? 'delta-down' : 'delta-flat';

      const currentTags = countBy(currentEvents.flatMap((entry) => entry.tags || []), (tag) => tag);
      const previousTags = countBy(previousEvents.flatMap((entry) => entry.tags || []), (tag) => tag);
      const rising = Object.entries(currentTags)
        .map(([tag, count]) => ({ tag, count, delta: count - (previousTags[tag] || 0) }))
        .filter((entry) => entry.delta > 0)
        .sort((a, b) => b.delta - a.delta || b.count - a.count || a.tag.localeCompare(b.tag))
        .slice(0, 4);

      const risingHtml = rising.length
        ? `<ul class="rank-list">${rising.map((entry, index) => {
            const maxDelta = rising[0].delta || 1;
            const width = Math.max(12, Math.round((entry.delta / maxDelta) * 100));
            return `<li class="rank-item"><div class="rank-head"><strong>${entry.tag}</strong><span class="rank-score">+${entry.delta}</span></div><div class="bar-shell"><div class="bar-fill" style="width:${width}%"></div></div><span class="tiny">${entry.count} mentions in current window</span></li>`;
          }).join('')}</ul>`
        : `<article class="insight-note"><span class="tiny">rising tags</span><strong>none are outpacing the last window.</strong><span class="tiny">That usually means the focus is steady, not scattered.</span></article>`;

      trendRadarEl.innerHTML = [
        `<article class="insight-note"><span class="tiny">window pulse</span><strong>${currentEvents.length} visible signals</strong><span class="tiny ${momentumClass}">${days ? `${momentumDelta >= 0 ? '+' : ''}${momentumDelta} vs previous ${days}-day window` : 'all-time view'}</span></article>`,
        `<article class="insight-note"><span class="tiny">hot surface</span><strong>${topKind ? `${topKind[0]} · ${topKind[1]} items` : 'no activity yet'}</strong><span class="tiny">${days ? `previous window: ${previousByKind[topKind?.[0]] || 0}` : 'sorted by current window volume'}</span></article>`,
        `<article class="insight-note"><span class="tiny">most opened page</span><strong>${topPage ? topPage[0] : 'n/a'}</strong><span class="tiny">${topPage ? `${topPage[1]} hits from visible items` : 'no destinations yet'}</span></article>`,
        days ? `<article class="insight-note"><span class="tiny">window compare</span><strong>${currentEvents.length} current / ${previousEvents.length} previous</strong><span class="tiny ${momentumClass}">${momentumDelta >= 0 ? '+' : ''}${momentumDelta} change in signal count</span></article>` : `<article class="insight-note"><span class="tiny">window compare</span><strong>all-time view</strong><span class="tiny">pick a fixed range to compare momentum against the prior period.</span></article>`,
        risingHtml
      ].join('');
    };

    const renderStream = (events) => {
      if (!events.length) {
        streamEl.innerHTML = '<li class="empty">no matching signals in this window yet.</li>';
        return;
      }

      streamEl.innerHTML = events.slice(0, 36).map((entry) => {
        const chips = (entry.tags || []).slice(0, 4).map((tag) => `<span class="chip">${tag}</span>`).join('');
        return `
          <li class="item">
            <div class="tiny">${entry.kind} · ${fmtDate(entry.date)}</div>
            <a href="${entry.href}">${entry.title}</a>
            <p>${entry.summary || 'no summary captured yet.'}</p>
            <div class="chips">${chips}</div>
          </li>
        `;
      }).join('');
    };

    const renderTags = (events) => {
      const counts = new Map();
      events.forEach((entry) => {
        (entry.tags || []).forEach((tag) => {
          const key = String(tag || '').trim().toLowerCase();
          if (!key) return;
          counts.set(key, (counts.get(key) || 0) + 1);
        });
      });

      const top = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, 14);

      if (!top.length) {
        tagsEl.innerHTML = '<li class="empty">no tags available for this filter.</li>';
        return;
      }

      tagsEl.innerHTML = top.map(([tag, count]) => `
        <li class="item">
          <h3>${tag}</h3>
          <p class="tiny">${count} mentions in visible window</p>
        </li>
      `).join('');
    };

    const renderHotPages = (events) => {
      const pages = Object.entries(countBy(events, (entry) => entry.href))
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, 6);

      if (!pages.length) return '<li class="empty">no destination pages in this filter yet.</li>';
      return pages.map(([href, count]) => {
        const sample = events.find((entry) => entry.href === href);
        return `<li class="rank-item"><div class="rank-head"><a href="${href}">${sample?.pageLabel || href}</a><span class="rank-score">${count}</span></div><span class="tiny">${href}</span></li>`;
      }).join('');
    };

    const syncSummary = (events) => {
      const source = kindSelect.value === 'all' ? 'all sources' : `${kindSelect.value} only`;
      const windowLabel = windowSelect.options[windowSelect.selectedIndex].textContent;
      summaryEl.textContent = `${events.length} signals visible · ${windowLabel} · ${source}`;
    };

    const init = async () => {
      const [updates, notes, milestones, expeditions] = await Promise.all([
        loadJson('assets/roost-updates.json', { updates: [] }),
        loadJson('assets/roost-notes.json', { notes: [] }),
        loadJson('assets/roost-milestones.json', []),
        loadJson('assets/roost-expeditions.json', [])
      ]);

      const allEvents = normalize({ updates, notes, milestones, expeditions });

      const render = () => {
        const filtered = filterEvents(allEvents);
        syncSummary(filtered);
        renderStats(filtered);
        renderTrendRadar(allEvents);
        renderStream(filtered);
        renderTags(filtered);
        hotPagesEl.innerHTML = renderHotPages(filtered);
      };

      [windowSelect, kindSelect].forEach((el) => el.addEventListener('change', render));
      searchInput.addEventListener('input', render);
      clearBtn.addEventListener('click', () => {
        windowSelect.value = '30';
        kindSelect.value = 'all';
        searchInput.value = '';
        render();
      });

      render();
    };

    init();
  </script>
</body>
</html>
